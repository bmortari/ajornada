# =============================================================
# AJORNADA - Docker Compose Unificado
# =============================================================
#
# AMBIENTES — tudo controlado pelo arquivo .env na raiz:
#
#   DEV  (máquina local):   cp .env.example .env
#                           edite .env com URLs localhost
#                           docker compose up -d --build
#
#   PROD (servidor):        cp .env.prod .env
#                           docker compose up -d --build
#
# Comandos úteis:
#   Serviço específico:    docker compose up -d --build <serviço>
#   Ver logs:              docker compose logs -f <serviço>
#   Parar tudo:            docker compose down
# =============================================================

services:

  # ============================================================
  # CORE - Portal / Gateway (porta 8000)
  # ============================================================
  core:
    build: ./core
    container_name: mestrado-prod
    ports:
      - "8000:8000"
    environment:
      - URL_APP_8001=${URL_APP_8001}
      - URL_APP_8002=${URL_APP_8002}
      - URL_APP_8003=${URL_APP_8003}
      - URL_APP_8004=${URL_APP_8004}
      - URL_APP_8005=${URL_APP_8005}
      - URL_APP_8006=${URL_APP_8006}
      - URL_APP_8007=${URL_APP_8007}
    restart: unless-stopped
    networks:
      - nativa-net

  # ============================================================
  # PALANQUEIA (porta 8002)
  # ============================================================
  palanqueia:
    build: ./palanqueIA
    container_name: palanqueia-prod
    ports:
      - "8002:8002"
    restart: always
    networks:
      - nativa-net

  # ============================================================
  # IATA (porta 8003)
  # ============================================================
  iata:
    build: ./iata
    container_name: iata
    ports:
      - "8003:8003"
    restart: always
    networks:
      - nativa-net

  # ============================================================
  # MOSAIKO (porta 8004)
  # ============================================================
  mosaiko:
    build: ./mosaiko
    container_name: mosaiko
    ports:
      - "8004:8004"
    restart: always
    networks:
      - nativa-net

  # ============================================================
  # AUDITORIA (porta 8006)
  # ============================================================
  auditoria:
    build: ./auditoria
    container_name: auditoria
    ports:
      - "8006:8006"
    env_file: .env
    restart: always
    networks:
      - nativa-net

  # ============================================================
  # LIA - Redis + Backend + Frontend + Nginx
  # ============================================================
  lia-redis:
    image: redis:7-alpine
    container_name: lia-redis
    ports:
      - "6379:6379"
    volumes:
      - lia-redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - nativa-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  lia:
    build:
      context: ./lia
      dockerfile: Dockerfile
    container_name: lia-app
    ports:
      - "8005:8000"
    env_file: .env
    environment:
      - APP_NAME=Sistema LIA
      - REDIS_URL=redis://lia-redis:6379/0
      - PAC_CSV_PATH=/app/app/data/DETALHAMENTOS.csv
    volumes:
      - ./lia/app:/app/app
      - ./lia/alembic:/app/alembic
      - ./lia/alembic.ini:/app/alembic.ini
    depends_on:
      lia-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nativa-net

  lia-frontend:
    build:
      context: ./lia/frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${LIA_PUBLIC_API_URL}
        - API_PROXY_URL=http://lia:8000
    container_name: lia-frontend
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_URL=http://lia:8000
    depends_on:
      - lia
    restart: unless-stopped
    networks:
      - nativa-net

  lia-nginx:
    image: nginx:alpine
    container_name: lia-nginx
    ports:
      - "8009:80"
    volumes:
      - ./lia/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lia
      - lia-frontend
    restart: unless-stopped
    networks:
      - nativa-net

  # ============================================================
  # CHATNORMAS (chatCNJ) - Postgres + Backend + Frontend
  # porta backend: 8001, postgres: 5433, frontend: 5173
  # ============================================================
  chatnormas-postgres:
    build: ./chatCNJ/postgres
    container_name: chatnormas-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: normas
      POSTGRES_USER: normas
      POSTGRES_PASSWORD: ${CHATNORMAS_POSTGRES_PASSWORD:-normas_secret}
    ports:
      - "5433:5432"
    volumes:
      - chatnormas-pg-data:/var/lib/postgresql/data
      - ./chatCNJ/normativos_cnj_bgem3.csv:/data/normativos_cnj_bgem3.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normas"]
      interval: 10s
      retries: 60
      start_period: 30s
    shm_size: '512mb'
    networks:
      - nativa-net

  chatnormas-backend:
    build: ./chatCNJ/backend
    container_name: chatnormas-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./chatCNJ/backend/app:/app/app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://normas:${CHATNORMAS_POSTGRES_PASSWORD:-normas_secret}@chatnormas-postgres:5432/normas
    depends_on:
      chatnormas-postgres:
        condition: service_healthy
    networks:
      - nativa-net

  chatnormas-frontend:
    build: ./chatCNJ/frontend
    container_name: chatnormas-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./chatCNJ/frontend/src:/app/src
      - ./chatCNJ/frontend/index.html:/app/index.html
      - ./chatCNJ/frontend/tsconfig.json:/app/tsconfig.json
    depends_on:
      - chatnormas-backend
    networks:
      - nativa-net

  # ============================================================
  # CHATDATAJUD - Cubestore + Cube + Backend + Frontend
  # porta frontend: 8007, cube: 4000
  # ============================================================
  chatdatajud-cubestore:
    image: cubejs/cubestore:latest
    container_name: chatdatajud-cubestore
    restart: unless-stopped
    environment:
      CUBESTORE_REMOTE_DIR: /cube/data
    volumes:
      - chatdatajud-cubestore-data:/cube/data
    networks:
      - nativa-net

  chatdatajud-cube:
    image: cubejs/cube:latest
    container_name: chatdatajud-cube
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres-pgvector
      CUBEJS_DB_PORT: "5432"
      CUBEJS_DB_NAME: datajud
      CUBEJS_DB_USER: datajud
      CUBEJS_DB_PASS: ${CHATDATAJUD_POSTGRES_PASSWORD:-datajud_secret}
      CUBEJS_API_SECRET: ${CUBE_API_SECRET:-cube_secret_change_me}
      CUBEJS_DEV_MODE: "false"
      CUBEJS_CUBESTORE_HOST: chatdatajud-cubestore
      CUBEJS_SCHEMA_PATH: model
    volumes:
      - ./chatdatajud/cube/model:/cube/conf/model:ro
    depends_on:
      - chatdatajud-cubestore
    networks:
      - nativa-net

  chatdatajud-backend:
    build: ./chatdatajud/backend
    container_name: chatdatajud-backend
    restart: unless-stopped
    volumes:
      - ./chatdatajud/backend/app:/app/app
    env_file: .env
    environment:
      CUBE_API_URL: http://chatdatajud-cube:4000/cubejs-api/v1
      CUBE_API_SECRET: ${CUBE_API_SECRET:-cube_secret_change_me}
      DATABASE_URL: postgresql://datajud:datajud_secret@postgres-pgvector:5432/datajud
    depends_on:
      - chatdatajud-cube
    networks:
      - nativa-net

  chatdatajud-frontend:
    build: ./chatdatajud/frontend
    container_name: chatdatajud-frontend
    restart: unless-stopped
    ports:
      - "8007:80"
    depends_on:
      - chatdatajud-backend
    networks:
      - nativa-net

# =============================================================
# VOLUMES
# =============================================================
volumes:
  lia-redis-data:
    name: lia-redis-data
  chatnormas-pg-data:
    name: chatnormas-pg-data
  chatdatajud-cubestore-data:
    name: chatdatajud-cubestore-data

# =============================================================
# NETWORKS
# =============================================================
networks:
  nativa-net:
    external: true
