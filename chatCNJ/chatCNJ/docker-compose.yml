services:
  # ── PostgreSQL 16 + pgvector ─────────────────────────────────
  postgres:
    build: ./postgres
    container_name: chatnormas-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: normas
      POSTGRES_USER: normas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-normas_secret}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./normativos_cnj_bgem3.csv:/data/normativos_cnj_bgem3.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normas"]
      interval: 10s
      retries: 60
      start_period: 30s
    shm_size: '512mb'

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: chatnormas-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://normas:${POSTGRES_PASSWORD:-normas_secret}@postgres:5432/normas
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (Vite Dev Server) ─────────────────────────
  frontend:
    build: ./frontend
    container_name: chatnormas-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/tsconfig.json:/app/tsconfig.json
    depends_on:
      - backend

volumes:
  pg_data:
