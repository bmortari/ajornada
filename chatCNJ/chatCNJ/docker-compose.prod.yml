version: '3.8'
services:
  postgres:
    build: ./postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: normas
      POSTGRES_USER: normas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normas"]
      interval: 10s
      retries: 30

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
