<!-- app/templates/embed.html -->

{% extends "base.html" %}

<!-- 1. Ativa a classe especial no body para esta página -->
{% block body_class %}page-embed{% endblock %}

{% block styles %}
<style>
    /* Remove o padding do container principal para controle total */
    .main-content {
        padding: 0;
        display: flex;
    }

    /* O container que terá o padding (respiro) */
    .embed-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        
        /* 2. Adiciona o espaçamento desejado ao redor de todo o conteúdo */
        padding: 0.25rem; 
        box-sizing: border-box; /* Garante que o padding não estoure o layout */
    }

    /* Garante que o iframe ocupe todo o espaço restante */
    .embed-iframe-container {
        flex-grow: 1;
        position: relative;
    }

    .embed-iframe-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        
        /* 3. Opcional: Adiciona bordas arredondadas para um visual mais suave */
        border-radius: 12px;
    }
</style>
{% endblock %}


{% block content %}
<div class="embed-wrapper">
    <!-- O container do Iframe agora está dentro do wrapper com padding -->
    <div class="embed-iframe-container">
        <iframe
            src="{{ embed_url }}"
            title="{{ embed_title }}">
            Seu navegador não suporta iframes.
        </iframe>
    </div>
</div>
{% endblock %}
